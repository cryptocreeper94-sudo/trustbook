    <script>
      window.loadMonaco = function() {
        if (window.__monacoLoaded) return Promise.resolve();
        return new Promise(function(resolve) {
          var s = document.createElement('script');
          s.src = 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/loader.min.js';
          s.onload = function() {
            require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs' }});
            window.MonacoEnvironment = { getWorkerUrl: function() { return 'data:text/javascript;charset=utf-8,' + encodeURIComponent('self.MonacoEnvironment={baseUrl:"https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/"};importScripts("https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/base/worker/workerMain.min.js");'); } };
            window.__monacoLoaded = true;
            resolve();
          };
          s.onerror = function() { resolve(); };
          document.head.appendChild(s);
        });
      };
    </script>
  
    <!-- DarkWave Studios Ecosystem Analytics -->
    <script>
      (function(){
        var appId = document.querySelector('meta[name="dw-app-id"]');
        var id = appId ? appId.content : window.location.hostname;
        function track(type, data) {
          try {
            navigator.sendBeacon('https://darkwavestudios.io/api/analytics', JSON.stringify({
              app: id, type: type, url: window.location.href,
              ref: document.referrer, ts: Date.now(), ...data
            }));
          } catch(e) {}
        }
        track('pageview');
        window.addEventListener('popstate', function(){ track('navigate'); });
        var origPush = history.pushState;
        history.pushState = function(){ origPush.apply(this, arguments); track('navigate'); };
      })();
    </script>

  <body style="background:#0a0f1e;margin:0">
    <div id="root">
      <div id="initial-loader" style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px">
        <div style="width:40px;height:40px;border:3px solid #22d3ee;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite"></div>
        <p style="color:#94a3b8;font-family:system-ui,sans-serif;font-size:14px;margin:0">Loading Trust Layer...</p>
      </div>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    <script>
      window.__tlLoaded = false;
      window.__tlScriptStarted = false;
      window.__diag = function(s, d) {
        var data = JSON.stringify({stage:s,detail:d});
        try { navigator.sendBeacon('/api/diag', new Blob([data], {type:'application/json'})); } catch(e) {}
      };
      window.__diag('html_parsed', 'inline script executing');
      window.onerror = function(msg, src, line, col, err) {
        window.__diag('js_error', msg + ' at ' + src + ':' + line);
        var d = document.getElementById('initial-loader');
        if (d) {
          d.innerHTML = '<div style="text-align:center;max-width:420px;padding:20px"><div style="font-size:36px;margin-bottom:12px">&#9888;</div><h2 style="color:#22d3ee;margin-bottom:8px;font-family:system-ui">Load Error</h2><p style="color:#94a3b8;font-size:13px;font-family:monospace;word-break:break-all;margin-bottom:16px">' + (msg || 'Unknown error') + '</p><button onclick="location.reload()" style="background:linear-gradient(135deg,#06b6d4,#8b5cf6);color:#fff;border:none;border-radius:12px;padding:14px 32px;font-size:16px;cursor:pointer;font-weight:600">Reload</button></div>';
        }
      };
      window.addEventListener('unhandledrejection', function(e) {
        window.__diag('promise_reject', String(e.reason));
        var d = document.getElementById('initial-loader');
        if (d && !window.__tlLoaded) {
          d.innerHTML = '<div style="text-align:center;max-width:420px;padding:20px"><div style="font-size:36px;margin-bottom:12px">&#9888;</div><h2 style="color:#22d3ee;margin-bottom:8px;font-family:system-ui">Load Error</h2><p style="color:#94a3b8;font-size:13px;font-family:monospace;word-break:break-all;margin-bottom:16px">' + (e.reason || 'Promise rejection') + '</p><button onclick="location.reload()" style="background:linear-gradient(135deg,#06b6d4,#8b5cf6);color:#fff;border:none;border-radius:12px;padding:14px 32px;font-size:16px;cursor:pointer;font-weight:600">Reload</button></div>';
        }
      });
      setTimeout(function() {
        if (!window.__tlLoaded) {
          window.__diag('timeout_15s', 'React not mounted after 15s');
          var d = document.getElementById('initial-loader');
          if (d) {
            var p = d.querySelector('p');
            if (p) p.textContent = 'Still loading... this is taking longer than expected.';
          }
        }
      }, 15000);
    </script>
